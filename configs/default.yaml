# 默认配置文件
_base_: []

model:
  base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api_key: ${OPENAI_API_KEY:}
  base_model: ${BASE_MODEL:gpt-4o}
  judge_base_url: ${JUDGE_BASE_URL:}
  judge_api_key: ${JUDGE_API_KEY:}
  judge_model: ${JUDGE_MODEL:}
  temperature: 0.2
  timeout_seconds: 30
  max_retries: 3

train:
  max_iterations: 10
  threshold: 0.95
  batch_size: 8

optimizer:
  result_pattern: '<result>(.*?)</result>'

evaluation:
  metrics: ["accuracy", "latency"]

data:
  train_path: ./datas/train/
  val_path: ./datas/val/

output:
  save_dir: ./outputs/
  save_logs: true
  save_iterations: true
